<?xml version="1.0" encoding="UTF-8"?>
<!--
  Aura — stylized divine female figure SVG.
  Designed to read as a mystical oracle / cosmic confidante on the
  /ask-aura page. All paths drawn programmatically; no external
  dependencies. Replace by dropping a real portrait at
  /assets/aura-portrait.png when you have one — the HTML uses an
  <img> with this SVG as fallback.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Cosmic background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a1d80" stop-opacity="1"/>
      <stop offset="55%" stop-color="#1a0e52" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0820" stop-opacity="1"/>
    </radialGradient>
    <!-- Halo gold gradient -->
    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f5d060" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c9a227" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <!-- Figure silhouette gradient (light at top, deeper at bottom) -->
    <linearGradient id="figureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f5d060" stop-opacity="0.12"/>
      <stop offset="40%"  stop-color="#9d7fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0820" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bgGlow)"/>

  <!-- Star field (programmatic-ish, hand-placed for composition) -->
  <g fill="#ffffff" opacity="0.65">
    <circle cx="40"  cy="80"  r="0.9"/>
    <circle cx="92"  cy="35"  r="1.2"/>
    <circle cx="160" cy="110" r="0.7"/>
    <circle cx="220" cy="55"  r="1.5" opacity="0.85"/>
    <circle cx="280" cy="140" r="0.6"/>
    <circle cx="345" cy="48"  r="1.1"/>
    <circle cx="420" cy="92"  r="0.9"/>
    <circle cx="485" cy="38"  r="1.3" opacity="0.9"/>
    <circle cx="560" cy="125" r="0.8"/>
    <circle cx="60"  cy="220" r="1.0"/>
    <circle cx="125" cy="290" r="0.7"/>
    <circle cx="500" cy="240" r="1.4" opacity="0.85"/>
    <circle cx="555" cy="320" r="0.9"/>
    <circle cx="32"  cy="420" r="1.2"/>
    <circle cx="565" cy="475" r="0.8"/>
    <circle cx="48"  cy="600" r="1.0"/>
    <circle cx="540" cy="640" r="1.1"/>
    <circle cx="78"  cy="780" r="0.9"/>
    <circle cx="525" cy="800" r="1.3" opacity="0.9"/>
    <circle cx="400" cy="720" r="0.6"/>
    <circle cx="180" cy="710" r="0.7"/>
    <circle cx="305" cy="850" r="1.0"/>
  </g>

  <!-- Crescent moon (top-right) -->
  <g transform="translate(490 130)">
    <circle r="36" fill="#f5d060" opacity="0.18"/>
    <path d="M 0,-26 A 26,26 0 1,0 0,26 A 18,18 0 1,1 0,-26 Z"
          fill="#f5d060" opacity="0.85" filter="url(#softGlow)"/>
  </g>

  <!-- Sacred geometry (concentric rings + 8-point star) behind figure -->
  <g transform="translate(300 470)" opacity="0.45">
    <circle r="220" fill="none" stroke="#c9a227" stroke-width="0.6" opacity="0.4"/>
    <circle r="180" fill="none" stroke="#c9a227" stroke-width="0.6" opacity="0.5"/>
    <circle r="140" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.6"/>
    <!-- 8-point compass dots -->
    <g fill="#f5d060">
      <circle cx="0"   cy="-220" r="2.2"/>
      <circle cx="156" cy="-156" r="1.8"/>
      <circle cx="220" cy="0"    r="2.2"/>
      <circle cx="156" cy="156"  r="1.8"/>
      <circle cx="0"   cy="220"  r="2.2"/>
      <circle cx="-156" cy="156" r="1.8"/>
      <circle cx="-220" cy="0"   r="2.2"/>
      <circle cx="-156" cy="-156" r="1.8"/>
    </g>
  </g>

  <!-- Halo behind head -->
  <circle cx="300" cy="280" r="120" fill="url(#haloGlow)"/>

  <!-- Stylized goddess figure: head + draped robe + cupped hands -->
  <!-- Head and hair -->
  <g filter="url(#softGlow)">
    <!-- Hair flowing back -->
    <path d="M 240,250
             C 220,200 240,150 300,140
             C 360,150 380,200 360,250
             C 380,260 380,320 360,360
             C 380,420 360,500 320,540
             L 280,540
             C 240,500 220,420 240,360
             C 220,320 220,260 240,250 Z"
          fill="#0a0820" opacity="0.85"/>
    <!-- Face oval -->
    <ellipse cx="300" cy="290" rx="48" ry="62" fill="url(#figureGrad)" opacity="0.92"/>
    <!-- Forehead bindi / third eye -->
    <circle cx="300" cy="270" r="2.5" fill="#f5d060" opacity="0.95"/>
    <circle cx="300" cy="270" r="6"   fill="#f5d060" opacity="0.18"/>
    <!-- Subtle face features (closed-eye contemplative look) -->
    <path d="M 282,295 Q 290,298 298,295" stroke="#0a0820" stroke-width="1.3" fill="none" opacity="0.55"/>
    <path d="M 302,295 Q 310,298 318,295" stroke="#0a0820" stroke-width="1.3" fill="none" opacity="0.55"/>
    <path d="M 290,322 Q 300,326 310,322" stroke="#0a0820" stroke-width="1.5" fill="none" opacity="0.45"/>
  </g>

  <!-- Shoulders + draped robe -->
  <g>
    <path d="M 180,540
             C 200,520 240,510 280,510
             L 320,510
             C 360,510 400,520 420,540
             L 460,720
             C 460,780 420,820 380,840
             L 220,840
             C 180,820 140,780 140,720 Z"
          fill="#1a0e52" opacity="0.92"/>
    <!-- Robe folds -->
    <path d="M 220,560 Q 200,680 220,820" stroke="#9d7fff" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M 280,540 Q 270,680 280,840" stroke="#9d7fff" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M 320,540 Q 330,680 320,840" stroke="#9d7fff" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M 380,560 Q 400,680 380,820" stroke="#9d7fff" stroke-width="1" fill="none" opacity="0.35"/>
    <!-- Gold neck ornament -->
    <ellipse cx="300" cy="540" rx="38" ry="6" fill="#f5d060" opacity="0.55"/>
    <ellipse cx="300" cy="546" rx="32" ry="4" fill="#c9a227" opacity="0.55"/>
  </g>

  <!-- Cupped hands at heart center -->
  <g opacity="0.7">
    <ellipse cx="300" cy="700" rx="40" ry="14" fill="#f5d060" opacity="0.18"/>
    <path d="M 270,700 Q 300,680 330,700 Q 320,720 300,720 Q 280,720 270,700 Z" fill="url(#figureGrad)" opacity="0.6"/>
    <!-- Tiny lotus / star in hands -->
    <g transform="translate(300 700)">
      <path d="M 0,-8 L 2,0 L 0,8 L -2,0 Z" fill="#f5d060" opacity="0.95"/>
      <path d="M -8,0 L 0,2 L 8,0 L 0,-2 Z" fill="#f5d060" opacity="0.95"/>
      <circle r="3" fill="#fff" opacity="0.85"/>
    </g>
  </g>

  <!-- Bottom fade for legibility of overlaid text -->
  <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="60%" stop-color="#0a0820" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0820" stop-opacity="0.85"/>
  </linearGradient>
  <rect x="0" y="600" width="600" height="300" fill="url(#bottomFade)"/>
</svg>
