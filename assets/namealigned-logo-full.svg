<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
  <title>NameAligned — Full Logo</title>

  <!-- Single clean outer gold ring -->
  <circle cx="112" cy="118" r="100" fill="none" stroke="#a8780e" stroke-width="3.5"/>

  <!-- Saturn orbit ring -->
  <ellipse cx="112" cy="118" rx="120" ry="22" fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.55" transform="rotate(-18,112,118)"/>

  <!-- Ghost N monogram -->
  <text x="78" y="128" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#2a1a7a" opacity="0.13" text-anchor="middle">N</text>

  <!-- Crescent moon -->
  <path d="M112,36 A82,82 0 1,1 112,200 A52,64 0 1,0 112,36 Z" fill="#1a0e52"/>

  <!-- Crescent inner edge -->
  <path d="M112,36 A52,64 0 1,0 112,200" fill="none" stroke="#3a2a8a" stroke-width="2" opacity="0.6"/>

  <!-- Compass rose -->
  <g transform="translate(76,92)" opacity="0.92">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#c9a227" stroke-width="1.1"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#c9a227" stroke-width="1.1"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="#c9a227" stroke-width="0.6" opacity="0.5"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="#c9a227" stroke-width="0.6" opacity="0.5"/>
    <polygon points="0,-16 3.5,-7 -3.5,-7" fill="#c9a227"/>
    <polygon points="0,16 3.5,7 -3.5,7" fill="#c9a227" opacity="0.5"/>
    <polygon points="16,0 7,3.5 7,-3.5" fill="#c9a227" opacity="0.5"/>
    <polygon points="-16,0 -7,3.5 -7,-3.5" fill="#c9a227" opacity="0.5"/>
    <circle cx="0" cy="0" r="4.5" fill="none" stroke="#c9a227" stroke-width="1.3"/>
    <circle cx="0" cy="0" r="1.8" fill="#c9a227"/>
  </g>

  <!-- Gold star -->
  <polygon points="158,67 161.8,75 170,75 163.5,80 166,88.5 158,83.5 150,88.5 152.5,80 146,75 154.2,75" fill="#c9a227"/>

  <!-- Small planet with ring -->
  <circle cx="170" cy="60" r="7" fill="#c9a227" opacity="0.95"/>
  <ellipse cx="170" cy="60" rx="13" ry="4" fill="none" stroke="#c9a227" stroke-width="1.1" opacity="0.7" transform="rotate(-15,170,60)"/>

  <!-- Dot trail -->
  <circle cx="176" cy="108" r="3" fill="#c9a227" opacity="0.55"/>
  <circle cx="178" cy="124" r="2" fill="#c9a227" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="238" y="136" font-family="Georgia,'Times New Roman',serif" font-size="56" font-weight="700" fill="#1a0e52">Name<tspan fill="#a8780e">Aligned</tspan></text>
  <line x1="238" y1="154" x2="656" y2="154" stroke="#a8780e" stroke-width="1.1"/>
  <text x="238" y="178" font-family="Georgia,serif" font-size="18" letter-spacing="4" fill="#5a4aaa">CHALDEAN NUMEROLOGY  ·  NAME ALIGNMENT</text>
</svg>
