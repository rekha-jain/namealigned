  <ellipse cx="44" cy="14" rx="6.5" ry="2" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.7" transform="rotate(-15,44,14)"/>

  <!-- Wordmark -->
  <text x="62" y="36" font-family="Georgia,'Times New Roman',serif" font-size="26" font-weight="700" fill="#1a0e52">Name<tspan fill="#a8780e">Aligned</tspan></text>
