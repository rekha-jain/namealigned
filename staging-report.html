<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet"/>
<meta name="googlebot" content="noindex, nofollow"/>
<title>[Staging] Report Workspace | NameAligned.com</title>
<link rel="icon" type="image/svg+xml" href="/assets/namealigned-favicon.svg"/>

<!-- Access to this page is gated server-side via Edge Middleware
     (see /middleware.js). HTTP Basic Auth using the STAGING_PASSWORD
     Vercel env var. By the time this HTML renders, the request is
     already authenticated, so the page just shows the entry form. -->
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0a0820;color:#f0ece0;font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100%}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .card{background:#1a1340;border:1px solid #2a1a5c;border-radius:14px;padding:36px 32px;width:100%;max-width:440px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  h1{font-family:Georgia,serif;color:#f0b429;margin:0 0 4px;font-size:24px;font-weight:normal;text-align:center}
  .sub{font-size:12px;color:#b0a898;text-align:center;margin-bottom:24px;letter-spacing:.04em}
  label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9d7fff;margin:14px 0 6px;font-weight:600}
  input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #333;background:#0a0820;color:#f0ece0;font-size:14px;outline:none;font-family:inherit}
  input:focus{border-color:#f0b429}
  input::placeholder{color:#5a5570}
  .btn{width:100%;padding:13px;background:#f0b429;color:#0a0820;border:0;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;margin-top:22px;font-family:inherit;letter-spacing:.02em}
  .btn:hover{background:#f5c247}
  .hint{font-size:11.5px;color:#7a7090;text-align:center;margin-top:14px;line-height:1.5}
  .badge{display:inline-block;background:rgba(240,180,41,.15);color:#f0b429;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:14px}
</style>
</head>
<body>

<div class="card">
  <div style="text-align:center"><span class="badge">Staging</span></div>
  <h1>Generate Report</h1>
  <div class="sub">No payment · Skips email + DB save</div>
  <form id="genForm">
    <label for="fName">Full name</label>
    <input type="text" id="fName" placeholder="As used daily" required autocomplete="off" autofocus>

    <label for="fDob">Date of birth</label>
    <input type="date" id="fDob" required>

    <label for="fMobile">Mobile number <span style="text-transform:none;color:#5a5570;font-weight:400;letter-spacing:0">(optional, 10 digits)</span></label>
    <input type="tel" id="fMobile" placeholder="9876543210" inputmode="numeric" maxlength="10">

    <button class="btn" type="submit">✦ Generate Report →</button>
    <div class="hint">Opens the report in this tab. Use back to come back and try another combination.</div>
  </form>
</div>

<script>
(function(){
  document.getElementById('fMobile').addEventListener('input', function(){
    this.value = this.value.replace(/\D/g,'').slice(0,10);
  });

  document.getElementById('genForm').onsubmit = function(e){
    e.preventDefault();
    var name   = document.getElementById('fName').value.trim();
    var dob    = document.getElementById('fDob').value;
    var mobile = document.getElementById('fMobile').value;
    if (!name || !dob) return;

    // Synthetic paymentId so generate-report.html proceeds. We
    // deliberately omit `email` so its saveAndEmail() short-circuits
    //, no DB row, no real email triggered during staging tests.
    var qp = new URLSearchParams({
      paymentId: 'STAGING-' + Date.now(),
      name:      name,
      dob:       dob
    });
    if (mobile) qp.set('mobile', mobile);

    location.href = 'generate-report?' + qp.toString();
  };
})();
</script>
</body>
</html>
